name: test

on:
  push:
  pull_request:
    types: [review_requested, ready_for_review]

jobs:
  # *************************************
  # ************* Pre-commit ************
  # *************************************
  pre-commit:
    name: pre-commit ${{ matrix.python-version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      max-parallel: 5
      matrix:
        os:
          - ubuntu-22.04
        python-version:
          - "3.10"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install detect-secrets
        run: pip install --no-cache-dir detect-secrets doc8 isort==5.11.5
      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  # *************************************
  # *********** Additional tests ********
  # *************************************
  test-sqlalchemy-integration:
    needs: pre-commit
    name: test-sqlalchemy-integration ${{ matrix.python-version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        os:
          - ubuntu-22.04
        python-version:
          - "3.14"
          - "3.13"
          - "3.12"
          - "3.11"
          - "3.10"
    steps:
      - name: Install wkhtmltopdf
        run: sudo apt-get update && sudo apt-get install -y wkhtmltopdf libpango-1.0-0 libharfbuzz0b libpangoft2-1.0-0 poppler-utils
      - name: Clean-up
        run: sudo apt clean && sudo apt autoclean && sudo rm -rf /tmp/* && sudo rm -rf /usr/share/dotnet && sudo rm -rf /opt/ghc && sudo rm -rf "/usr/local/share/boost" && sudo rm -rf "$AGENT_TOOLSDIRECTORY"
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
      - name: Install test dependencies
        run: |
          python -m pip install --no-cache-dir Django djangorestframework django-extensions drf_spectacular
      - name: Compile requirements
        run: uv pip compile examples/requirements/flask.in --no-strip-extras
      - name: Install requirements
        run: pip install --no-cache-dir -r examples/requirements/flask.txt
      - name: Run test suite
        run: pytest -vrx src/faker_file/tests/test_sqlalchemy_integration.py
        env:
          PYTEST_ADDOPTS: "-vv --durations=10"

  test-augmented-file-from-dir-provider:
    needs: pre-commit
    name: test-augmented-file-from-dir-provider ${{ matrix.python-version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        os:
          - ubuntu-22.04
        python-version:
          - "3.14"
          - "3.13"
          - "3.12"
          - "3.11"
          - "3.10"
          # - "3.9"
    steps:
      - name: Install wkhtmltopdf
        run: sudo apt-get update && sudo apt-get install -y wkhtmltopdf libpango-1.0-0 libharfbuzz0b libpangoft2-1.0-0 poppler-utils
      - name: Clean-up
        run: sudo apt clean && sudo apt autoclean && sudo rm -rf /tmp/* && sudo rm -rf /usr/share/dotnet && sudo rm -rf /opt/ghc && sudo rm -rf "/usr/local/share/boost" && sudo rm -rf "$AGENT_TOOLSDIRECTORY"
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
      - name: Install test dependencies
        run: |
          python -m pip install --no-cache-dir Django djangorestframework django-extensions drf_spectacular
      - name: Compile requirements
        run: uv pip compile examples/requirements/ml.in --no-strip-extras -o examples/requirements/ml.txt
      - name: Install requirements
        run: pip install --no-cache-dir -r examples/requirements/ml.txt
      - name: Run test suite
        run: pytest -vrx src/faker_file/tests/test_augment_file_from_dir_provider.py
        env:
          PYTEST_ADDOPTS: "-vv --durations=10"
      - name: Coveralls
        id: coveralls-setup
        continue-on-error: true
        uses: AndreMiras/coveralls-python-action@develop
        with:
          parallel: true
          flag-name: Run Tests

  # *************************************
  # ************* Main tests ************
  # *************************************
  test:
    needs: pre-commit
    name: test py${{ matrix.python-version }} - pathy${{ matrix.pathy-version }} - dj${{ matrix.django-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        os:
          - ubuntu-22.04
        python-version:
          - "3.14"
          - "3.13"
          - "3.12"
          - "3.11"
          - "3.10"
          # - "3.9"
        django-version:
          - "42"
        pathy-version:
          - "0.10.3"
          - "0.11"
        exclude:
          - python-version: "3.14"
            pathy-version: "0.10.3"
          - python-version: "3.13"
            pathy-version: "0.10.3"
          - python-version: "3.12"
            pathy-version: "0.10.3"
    steps:
    - name: Install wkhtmltopdf
      run: sudo apt-get update && sudo apt-get install -y wkhtmltopdf libpango-1.0-0 libharfbuzz0b libpangoft2-1.0-0 poppler-utils
    - name: Clean-up
      run: sudo apt clean && sudo apt autoclean && sudo rm -rf /tmp/* && sudo rm -rf /usr/share/dotnet && sudo rm -rf /opt/ghc && sudo rm -rf "/usr/local/share/boost" && sudo rm -rf "$AGENT_TOOLSDIRECTORY"
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Upgrade pip
      run: |
        python -m pip install --upgrade pip
    - name: Install Django dependency (Django 4.2)
      run: pip install -r examples/requirements/django_4_2.in
    - name: Install package
      run: |
        pip install -e .[all]
    - name: Install pathy dependency
      run: pip install "pathy==${{ matrix.pathy-version }}"
    - name: Prepare directories
      run: |
        mkdir -p examples/django_example/project/media/
        mkdir -p examples/django_example/project/static/
    - name: List all requirements
      run: |
        pip list
    - name: Run test suite
      run: pytest -vrx -m "not optional" --ignore src/faker_file/tests/test_sqlalchemy_integration.py --ignore src/faker_file/tests/test_augment_file_from_dir_provider.py
      env:
        PYTEST_ADDOPTS: "-vv --durations=10"
    - name: Coveralls
      id: coveralls-setup
      continue-on-error: true
      uses: AndreMiras/coveralls-python-action@develop
      with:
        parallel: true
        flag-name: Run Tests

  # *************************************
  # ************** Coveralls ************
  # *************************************
  coveralls_finish:
    name: coveralls_finish
    needs: test
    runs-on: ubuntu-latest
    steps:
    - name: Install dependencies
      run: |
        python -m pip install pyyaml
    - name: Coveralls Finished
      id: coveralls-finish
      continue-on-error: true
      env:
        COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
        GITHUB_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
      uses: AndreMiras/coveralls-python-action@develop
      with:
        parallel-finished: true
        debug: True
