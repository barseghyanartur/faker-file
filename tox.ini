[tox]
envlist =
    py{39,310,311,312}-django{42}
    py{310,311,312,313}-django{50,51}
    py{39,310,311}-django{42,50}-pathy{0103,0110}
    py312-django{42,50}-pathy0110
requires =
    tox-uv>=1.11.0

[testenv]
# Explicitly use the uv runner provided by tox-uv
runner = uv-venv
# Ensure it uses the pythons we installed via 'uv python install'
uv_python_preference = managed
envlogdir={work_dir}/{env_name}/tmp
passenv = *
allowlist_externals = mkdir
extras = all
deps =
    django42: -r{toxinidir}/examples/requirements/django_4_2.txt
    django50: -r{toxinidir}/examples/requirements/django_5_0.txt
    django51: -r{toxinidir}/examples/requirements/django_5_1.txt
    pathy0103: pathy==0.10.3
    pathy0110: pathy==0.11.0
commands =
    mkdir -p examples/django_example/project/media/
    mkdir -p examples/django_example/project/static/
    pytest -vrx -m "not optional" \
        --ignore src/faker_file/tests/test_sqlalchemy_integration.py \
        --ignore src/faker_file/tests/test_augment_file_from_dir_provider.py \
        {posargs}
