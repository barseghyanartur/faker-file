[tox]
requires =
    tox-uv>=1
envlist =
    py{39,310,311}-django42-pathy{0103,0110}
    py{312,313}-django42-pathy0110

[testenv]
runner = uv-venv-runner
envlogdir = {work_dir}/{env_name}/tmp
passenv = *
allowlist_externals = *
deps =
    django42: -r{toxinidir}/examples/requirements/django_4_2.in
    pathy0103: pathy==0.10.3
    pathy0110: pathy==0.11.0
commands =
    mkdir -p examples/django_example/project/media/
    mkdir -p examples/django_example/project/static/
    uv pip install -e .[all]
    {envpython} -m pytest -vrx -m "not optional" \
        --ignore src/faker_file/tests/test_sqlalchemy_integration.py \
        --ignore src/faker_file/tests/test_augment_file_from_dir_provider.py \
        --cov-report=html:htmlcov/{envname}

[gh-actions]
python =
    3.9: py39
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313
